name: ✍️ AI Article Writer

on:
  schedule:
    # Runs every day at 07:00 UTC (9:00 Spain time)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom topic to write about (optional - leave blank for auto)'
        required: false
        default: ''
      language:
        description: 'Language for article'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - es
          - ar

jobs:
  write-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests python-slugify

      - name: ✍️ Generate article with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CUSTOM_TOPIC: ${{ github.event.inputs.topic }}
          ARTICLE_LANG: ${{ github.event.inputs.language || 'both' }}
        run: python scripts/write_article.py

      - name: 📤 Commit and push article
        run: |
          git config --global user.name "LaRegularizacion Bot"
          git config --global user.email "bot@laregularizacion.es"
          git add src/content/articles/
          git diff --staged --quiet || git commit -m "✍️ New article: $(date '+%Y-%m-%d') [AI Writer]"
          git push
