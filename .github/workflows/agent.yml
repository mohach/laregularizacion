name: Daily Content Agent

on:
  schedule:
    # Runs at 07:00 Madrid time (06:00 UTC in summer, 07:00 UTC in winter)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if already ran today'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  agent:
    name: Run DeepSeek Content Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run EXPERT Extranjería Agent
        id: run-agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/agent-expert.mjs

      - name: Commit and push new content
        run: |
          # Configure git
          git config --local user.email "agent@laregularizacion.com"
          git config --local user.name "LaRegularizacion Agent"
          
          # Check if there are any blog posts
          BLOG_FILES=$(find src/content/blog -name '*.mdx' -type f 2>/dev/null)
          if [ -z "$BLOG_FILES" ]; then
            echo "⚠️ No blog posts generated, skipping commit"
            exit 0
          fi
          
          echo "📁 Blog files found:"
          echo "$BLOG_FILES"
          
          # Add files
          git add src/content/blog/ src/data/trending.json
          
          # Check if there are actual changes
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit (identical content)"
            exit 0
          fi
          
          # Commit and push
          git commit -m "🤖 Daily content update — $(date '+%Y-%m-%d')"
          git push
          echo "✅ Changes committed and pushed"

      - name: Trigger Cloudflare Pages deploy
        if: success()
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if [ -n "$CF_DEPLOY_HOOK" ]; then
            curl -X POST "$CF_DEPLOY_HOOK"
            echo "✅ Cloudflare Pages deploy triggered"
          else
            echo "⚠️ CF_DEPLOY_HOOK not set, skipping deploy trigger"
          fi

      - name: Summary
        run: |
          echo "### 🤖 Agent Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          BLOG_COUNT=$(find src/content/blog -name "*.mdx" 2>/dev/null | wc -l)
          echo "- **Blog posts:** $BLOG_COUNT total" >> $GITHUB_STEP_SUMMARY
          if [ -f src/data/trending.json ]; then
            echo "- **Trending data:** Updated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Status:** ${{ steps.run-agent.outcome }}" >> $GITHUB_STEP_SUMMARY